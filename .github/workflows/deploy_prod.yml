name: PROD GKE Deploy - Kong Wrapper Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: probestack-prod
  ARTIFACT_REPO: probestack-prod-apps
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  SERVICE_NAME: fsp-kong-wrapper-svc         
  GKE_CLUSTER: probestack-zonal-cluster
  GKE_LOCATION: us-central1-a
  GKE_LOCATION_FLAG: --zone
  NAMESPACE: forgesphere-prod                 

jobs:
  deploy:

    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:

      ########################################
      # CHECKOUT
      ########################################
      - name: Checkout source code
        uses: actions/checkout@v4

      ########################################
      # AUTH GCP
      ########################################
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/861433193200/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deployer@probestack-prod.iam.gserviceaccount.com
          token_format: access_token

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Install GKE auth plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      ########################################
      # DOCKER BUILD
      ########################################
      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      ########################################
      # CONNECT TO GKE
      ########################################
      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
          ${{ env.GKE_LOCATION_FLAG }} ${{ env.GKE_LOCATION }} \
          --project ${{ env.PROJECT_ID }}

      ########################################
      # DEPLOY
      ########################################
      - name: Update deployment image
        run: |
          kubectl set image deployment/${{ env.SERVICE_NAME }} \
          ${{ env.SERVICE_NAME }}=${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
          -n ${{ env.NAMESPACE }}

      ########################################
      # WAIT FOR ROLLOUT
      ########################################
      - name: Wait for deployment rollout
        run: |
          kubectl rollout status deployment/${{ env.SERVICE_NAME }} \
          -n ${{ env.NAMESPACE }}

      ########################################
      # VERIFY
      ########################################
      - name: Verify running pods
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide
